name: Rust

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

env:
  CARGO_TERM_COLOR: always

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - name: Build
      run: cargo build --verbose
    - name: Run tests
      run: cargo test --verbose

  macos-intel-compat:
    runs-on: macos-15-intel

    steps:
    - uses: actions/checkout@v4
    - name: Verify Intel macOS runner
      run: |
        test "$(uname -s)" = "Darwin"
        test "$(uname -m)" = "x86_64"
        sw_vers
    - name: Build machina
      run: cargo build --bin machina --verbose
    - name: Run compat-mode smoke test
      run: cargo test --test compat_mode_macos --verbose
