name: Rust

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - name: Cache Cargo build artifacts
      uses: actions/cache@v4
      with:
        path: |
          ~/.cargo/registry/index
          ~/.cargo/registry/cache
          ~/.cargo/git/db
          target
        key: ${{ runner.os }}-cargo-${{ github.job }}-${{ hashFiles('**/Cargo.lock') }}-${{ github.sha }}
        restore-keys: |
          ${{ runner.os }}-cargo-${{ github.job }}-${{ hashFiles('**/Cargo.lock') }}-
          ${{ runner.os }}-cargo-${{ github.job }}-
    - name: Build and run tests
      run: cargo test --workspace --verbose

  macos-intel-compat:
    runs-on: macos-15-intel

    steps:
    - uses: actions/checkout@v4
    - name: Cache Cargo build artifacts
      uses: actions/cache@v4
      with:
        path: |
          ~/.cargo/registry/index
          ~/.cargo/registry/cache
          ~/.cargo/git/db
          target
        key: ${{ runner.os }}-cargo-${{ github.job }}-${{ hashFiles('**/Cargo.lock') }}-${{ github.sha }}
        restore-keys: |
          ${{ runner.os }}-cargo-${{ github.job }}-${{ hashFiles('**/Cargo.lock') }}-
          ${{ runner.os }}-cargo-${{ github.job }}-
    - name: Verify Intel macOS runner
      run: |
        test "$(uname -s)" = "Darwin"
        test "$(uname -m)" = "x86_64"
        sw_vers
    - name: Verify compatibility utility excludes analysis crate
      run: |
        if cargo tree -p compatra-cli --no-default-features -e normal | grep -q 'machoscope-analysis'; then
          echo "machoscope-analysis unexpectedly appears in no-default compatibility dependency graph"
          cargo tree -p compatra-cli --no-default-features -e normal
          exit 1
        fi
    - name: Build and test compat utility with proof output
      run: cargo test -p compatra-cli --release --no-default-features --test compat_mode_macos --verbose -- --include-ignored --nocapture
    - name: Package macOS arm64 compatibility test fixtures
      if: always()
      run: |
        mkdir -p dist
        if [ ! -d target/compatra-fixtures ]; then
          echo "target/compatra-fixtures was not generated"
          exit 0
        fi
        {
          echo "Compatra macOS arm64 compatibility test fixtures"
          echo "generated_at=$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          echo "runner=$(uname -s) $(uname -m)"
          echo
          find target/compatra-fixtures -type f -print | sort | while read -r file_path; do
            echo "## ${file_path#target/compatra-fixtures/}"
            file "$file_path"
            if lipo -info "$file_path" >/dev/null 2>&1; then
              lipo -info "$file_path"
            fi
            shasum -a 256 "$file_path"
            echo
          done
        } > dist/compatra-test-fixtures-macos-arm64.manifest.txt
        tar -czf dist/compatra-test-fixtures-macos-arm64.tar.gz -C target compatra-fixtures
        shasum -a 256 dist/compatra-test-fixtures-macos-arm64.tar.gz > dist/compatra-test-fixtures-macos-arm64.tar.gz.sha256
        ls -lh dist
    - name: Upload macOS arm64 compatibility test fixtures
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: compatra-test-fixtures-macos-arm64
        path: |
          dist/compatra-test-fixtures-macos-arm64.tar.gz
          dist/compatra-test-fixtures-macos-arm64.tar.gz.sha256
          dist/compatra-test-fixtures-macos-arm64.manifest.txt
        if-no-files-found: warn
        retention-days: 14
    - name: Package Intel macOS compatibility utility
      run: |
        test -x target/release/compatra
        mkdir -p dist
        cp target/release/compatra dist/compatra
        chmod +x dist/compatra
        tar -czf dist/compatra-macos-intel-x86_64.tar.gz -C dist compatra
        shasum -a 256 dist/compatra-macos-intel-x86_64.tar.gz > dist/compatra-macos-intel-x86_64.tar.gz.sha256
        ls -lh dist
    - name: Upload Intel macOS compatibility utility
      uses: actions/upload-artifact@v4
      with:
        name: compatra-macos-intel-x86_64
        path: |
          dist/compatra-macos-intel-x86_64.tar.gz
          dist/compatra-macos-intel-x86_64.tar.gz.sha256
        if-no-files-found: error
        retention-days: 14
