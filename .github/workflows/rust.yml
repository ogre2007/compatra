name: Rust

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - name: Cache Cargo build artifacts
      uses: actions/cache@v4
      with:
        path: |
          ~/.cargo/registry/index
          ~/.cargo/registry/cache
          ~/.cargo/git/db
          target
        key: ${{ runner.os }}-cargo-${{ github.job }}-${{ hashFiles('**/Cargo.lock') }}-${{ github.sha }}
        restore-keys: |
          ${{ runner.os }}-cargo-${{ github.job }}-${{ hashFiles('**/Cargo.lock') }}-
          ${{ runner.os }}-cargo-${{ github.job }}-
    - name: Build and run tests
      run: cargo test --workspace --verbose

  macos-intel-compat:
    runs-on: macos-15-intel

    steps:
    - uses: actions/checkout@v4
    - name: Cache Cargo build artifacts
      uses: actions/cache@v4
      with:
        path: |
          ~/.cargo/registry/index
          ~/.cargo/registry/cache
          ~/.cargo/git/db
          target
        key: ${{ runner.os }}-cargo-${{ github.job }}-${{ hashFiles('**/Cargo.lock') }}-${{ github.sha }}
        restore-keys: |
          ${{ runner.os }}-cargo-${{ github.job }}-${{ hashFiles('**/Cargo.lock') }}-
          ${{ runner.os }}-cargo-${{ github.job }}-
    - name: Verify Intel macOS runner
      run: |
        test "$(uname -s)" = "Darwin"
        test "$(uname -m)" = "x86_64"
        sw_vers
    - name: Verify compatibility utility excludes analysis crate
      run: |
        if cargo tree -p machina-compat-cli --no-default-features -e normal | grep -q 'machina-analysis'; then
          echo "machina-analysis unexpectedly appears in no-default compatibility dependency graph"
          cargo tree -p machina-compat-cli --no-default-features -e normal
          exit 1
        fi
    - name: Build and test compat utility with proof output
      run: cargo test -p machina-compat-cli --release --no-default-features --test compat_mode_macos --verbose -- --include-ignored --nocapture
    - name: Package macOS arm64 compatibility test fixtures
      if: always()
      run: |
        mkdir -p dist
        if [ ! -d target/machina-compat-fixtures ]; then
          echo "target/machina-compat-fixtures was not generated"
          exit 0
        fi
        {
          echo "Machina macOS arm64 compatibility test fixtures"
          echo "generated_at=$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          echo "runner=$(uname -s) $(uname -m)"
          echo
          find target/machina-compat-fixtures -type f -print | sort | while read -r file_path; do
            echo "## ${file_path#target/machina-compat-fixtures/}"
            file "$file_path"
            if lipo -info "$file_path" >/dev/null 2>&1; then
              lipo -info "$file_path"
            fi
            shasum -a 256 "$file_path"
            echo
          done
        } > dist/machina-compat-test-fixtures-macos-arm64.manifest.txt
        tar -czf dist/machina-compat-test-fixtures-macos-arm64.tar.gz -C target machina-compat-fixtures
        shasum -a 256 dist/machina-compat-test-fixtures-macos-arm64.tar.gz > dist/machina-compat-test-fixtures-macos-arm64.tar.gz.sha256
        ls -lh dist
    - name: Upload macOS arm64 compatibility test fixtures
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: machina-compat-test-fixtures-macos-arm64
        path: |
          dist/machina-compat-test-fixtures-macos-arm64.tar.gz
          dist/machina-compat-test-fixtures-macos-arm64.tar.gz.sha256
          dist/machina-compat-test-fixtures-macos-arm64.manifest.txt
        if-no-files-found: warn
        retention-days: 14
    - name: Package Intel macOS compatibility utility
      run: |
        test -x target/release/machina-compat
        mkdir -p dist
        cp target/release/machina-compat dist/machina-compat
        chmod +x dist/machina-compat
        tar -czf dist/machina-compat-macos-intel-x86_64.tar.gz -C dist machina-compat
        shasum -a 256 dist/machina-compat-macos-intel-x86_64.tar.gz > dist/machina-compat-macos-intel-x86_64.tar.gz.sha256
        ls -lh dist
    - name: Upload Intel macOS compatibility utility
      uses: actions/upload-artifact@v4
      with:
        name: machina-compat-macos-intel-x86_64
        path: |
          dist/machina-compat-macos-intel-x86_64.tar.gz
          dist/machina-compat-macos-intel-x86_64.tar.gz.sha256
        if-no-files-found: error
        retention-days: 14
